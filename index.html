<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>彩の国100マイル ライブリプレイ</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div>
          <h1>彩の国100マイル ライブリプレイ</h1>
          <p>Produced by 今日は走らないでビール だいす / 第11回トレニックワールド100mile in 彩の国</p>
        </div>
      </header>

      <section class="controller" aria-label="playback controls">
        <div class="clock" id="clock">00:00</div>
        <input id="timeSlider" type="range" min="0" max="126000" value="0" step="60" aria-label="race time">
        <div class="control-buttons">
          <button id="resetBtn" type="button">リセット</button>
          <button id="playBtn" class="primary" type="button">再生</button>
          <button id="speedBtn" type="button">speed 300x</button>
          <button id="zoomBtn" type="button">Expand 1x</button>
        </div>
      </section>

      <section class="course-card">
        <svg id="courseSvg" viewBox="0 0 1200 420" role="img" aria-label="sainokuni course visualizer"></svg>
      </section>

      <section class="race-strip" aria-label="race summary">
        <article><span>Entries</span><strong id="entriesStat">-</strong></article>
        <article><span>Finish</span><strong id="finishStat">-</strong></article>
        <article><span>DNF</span><strong id="dnfStat">-</strong></article>
        <article><span>Visible</span><strong id="visibleStat">-</strong></article>
      </section>

      <section class="layout">
        <aside class="panel">
          <div class="panel-head">
            <h2>表示する選手</h2>
            <button id="clearSelectionBtn" type="button">全解除</button>
          </div>
          <label class="search">
            <span>検索</span>
            <input id="searchInput" type="search" placeholder="氏名 / No. / 所属 / 都道府県">
          </label>
          <div class="preset-groups" aria-label="runner category presets">
            <div>
              <span>完走者</span>
              <div class="tabs" role="group" aria-label="finishers">
                <button class="is-active" data-mode="leaders" type="button">上位20</button>
                <button data-mode="women" type="button">女子</button>
                <button data-mode="finishers" type="button">完走者</button>
              </div>
            </div>
            <div>
              <span>DNF</span>
              <div class="tabs" role="group" aria-label="dnf">
                <button data-mode="dnf" type="button">DNF</button>
                <button data-mode="all" type="button">全部</button>
                <button data-mode="ekiden" type="button">駅伝</button>
              </div>
            </div>
          </div>
          <div id="runnerList" class="runner-list"></div>
        </aside>
      </section>

      <section class="support-panel">
        <div>
          <h2>今日は走らないでビール</h2>
          <p>トレイルランやレースの話を、ビール片手にゆるく話しているポッドキャストです。レースの振り返りやトレイルランの話も配信しています。</p>
          <div class="podcast-links">
            <a href="https://open.spotify.com/show/0j1TXvIRRcwkbfsRHjM5qT" target="_blank" rel="noopener noreferrer">Spotify</a>
            <a href="https://podcasts.apple.com/jp/podcast/今日は走らないでビール/id1655012487" target="_blank" rel="noopener noreferrer">Apple Podcasts</a>
          </div>
        </div>
        <a class="ofuse-button" href="https://ofuse.me/o?uid=163955" target="_blank" rel="noopener noreferrer">OFUSEで応援を送る</a>
      </section>
    </main>

    <script src="./data.js?v=5"></script>
    <script src="./profile.js?v=4"></script>
    <script src="./app.js?v=11"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
